# Optional Home Assistant package for Baby Diary icons and palette.
#
# Copy this file to /config/packages/baby_diary_icons.yaml after installing
# the HACS dashboard resource.

input_button:
  baby_diary_diaper:
    name: Baby Diary - Fralda
    icon: baby:diaper
  baby_diary_xixi:
    name: Baby Diary - Xixi
    icon: baby:xixi
  baby_diary_coco:
    name: Baby Diary - Coco
    icon: baby:coco
  baby_diary_ambos:
    name: Baby Diary - Ambos
    icon: baby:ambos
  baby_diary_mamada:
    name: Baby Diary - Mamada
    icon: baby:mamada

template:
  - sensor:
      - name: Baby Diary Icon Palette
        unique_id: baby_diary_icon_palette
        state: ready
        icon: baby:app
        attributes:
          app: "#F8FAFC"
          diaper: "#CBD5E1"
          xixi: "#FACC15"
          coco: "#92400E"
          ambos: "#A855F7"
          mamada: "#F9A8D4"
          mint: "#6EE7B7"

